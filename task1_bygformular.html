<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms and JavaScript</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Forsiden</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Byg en web-formular fra grunden</h1>

      <form>
        <label for="firstname">
          <input type="text" id="firstname" />
          First name
        </label>
        <label for="pw">
          <input type="password" id="pw" />
          Password
        </label>
        <label for="num">
          <input type="number" id="num" />
          Age
        </label>
        <label for="mail">
          <input type="email" id="mail" />
          e-mail
        </label>
        <label for="tel">
          <input type="tel" id="tel" />
          Telephone
        </label>
        <label for="date">
          <input type="date" id="date" />
          Date
        </label>

        <fieldset>
          <legend>Pets you've got at home</legend>
          <label for="dog">
            <input type="checkbox" id="dog" name="dog" value="dog" />
            Dog
          </label>
          <label for="cat">
            <input type="checkbox" id="cat" name="cat" value="cat" />
            Cat
          </label>
          <label for="octopus">
            <input type="checkbox" id="octopus" name="octopus" value="octopus" />
            Octopus
          </label>
        </fieldset>

        <fieldset>
          <legend>Do you like animals</legend>

          <label for="yes">
            <input type="radio" id="yes" name="likeanimals" />
            Yes
          </label>

          <label for="no">
            <input type="radio" id="no" name="likeanimals" />
            No
          </label>
        </fieldset>
        <button>Indsend data</button>
      </form>
    </main>

    <footer></footer>
  </body>
</html>
